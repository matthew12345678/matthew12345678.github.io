<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sample Keyboard</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#6fb0c6;
  font-family: Arial, sans-serif;
  color:#000;
}

.container {
  background:#6fb0c6;
  padding:60px 40px 80px;
  width:1100px;
  margin:0 auto;
  position:relative;
}

.title {
  background:#ffe800;
  display:block;
  margin:0 auto 50px;
  text-align:center;
  width:fit-content;
  padding:10px 25px;
  font-weight:bold;
  font-size:28px;
  border:4px solid #000;
}

.file-row {
  margin-bottom:60px;
}

.choose-btn {
  background:#ffa500;
  border:4px solid black;
  padding:15px 25px;
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
  display:inline-block;
  margin-right:20px;
}

.instructions {
  font-size:20px;
  margin-left:20px;
  color:#000;
  text-shadow:none;
  font-weight:700;
  line-height:1.4;
}

.keys {
  margin-top:60px;
  margin-bottom:40px;
}

.key {
  background:#ffe800;
  display:inline-block;
  width:90px;
  height:90px;
  line-height:90px;
  text-align:center;
  font-size:48px;
  margin-right:10px;
  cursor:pointer;
  user-select:none;
  border:2px solid #000;
  box-shadow:3px 3px 0 rgba(0,0,0,0.2);
}

.key.active {
  background:#ffcc00;
  transform:translateY(2px);
  box-shadow:1px 1px 0 rgba(0,0,0,0.2);
}

.play-instruction {
  margin-bottom:30px;
}

.slider-group {
  margin-top:70px;
}

.slider-block {
  margin-top:0;
}

.slider-block + .slider-block {
  margin-top:60px;
}

.slider-label {
  font-weight:900;
  font-size:24px;
  margin-top:24px;
  letter-spacing:0.5px;
  color:#000;
}

/* black line sliders */
input[type="range"] {
  -webkit-appearance:none;
  appearance:none;
  width:280px;
  background:transparent;
}

input[type="range"]::-webkit-slider-runnable-track {
  height:14px;
  background:#000;
  border-radius:0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none;
  appearance:none;
  width:22px;
  height:70px;
  margin-top:-28px;
  background:#ffed00;
  border:4px solid #000;
  border-radius:0;
  cursor:pointer;
}

input[type="range"]::-moz-range-track {
  height:14px;
  background:#000;
  border:none;
  border-radius:0;
}

input[type="range"]::-moz-range-thumb {
  width:22px;
  height:70px;
  background:#ffed00;
  border:4px solid #000;
  border-radius:0;
  cursor:pointer;
}

.loop-toggle {
  display:inline-block;
  margin-left:40px;
}

.loop-box {
  background:#ffe800;
  width:70px;
  height:70px;
  text-align:center;
  line-height:70px;
  font-size:40px;
  cursor:pointer;
  border:4px solid black;
}

.loop-box.active {
  background:#ffcc00;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">SAMPLE KEYBOARD</div>

  <div class="file-row">
    <label class="choose-btn">
      CHOOSE FILES
      <input type="file" id="folderInput" webkitdirectory multiple hidden>
    </label>
    <span class="instructions">
      Select a folder of 10 sounds (.wav or .mp3)
    </span>
  </div>

  <div class="keys" id="keys"></div>

  <div class="instructions play-instruction">
    play sounds using keys
  </div>

  <div class="slider-group">
    <div class="slider-block">
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
      <div class="slider-label">VOLUME</div>
    </div>

    <div class="slider-block">
      <input type="range" id="speed" min="0.25" max="2" step="0.01" value="1">
      <div class="slider-label">SPEED</div>
    </div>

    <!-- Loop toggle button is HIDDEN but loop functionality is ON by default -->
    <div class="loop-toggle" style="display:none;">
      <div id="loopBtn" class="loop-box active">X</div>
      <div style="margin-top:10px;font-weight:bold;">
        LOOP SOUNDS<br>
        x = looped<br>
        o = not loops
      </div>
    </div>
  </div>
</div>

<script>
const letters = ['Q','W','E','R','T','Y','U','I','O','P'];
const keyContainer = document.getElementById("keys");

let audioBuffers = {};
let activeSources = {};
let loopEnabled = true;  // LOOP IS ALWAYS ON (hidden but active)

const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioContext.createGain();
masterGain.connect(audioContext.destination);
masterGain.gain.value = 1;

// Unlock audio on first click
function unlockAudio() {
  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }
}
document.body.addEventListener("click", unlockAudio, { once: true });
document.body.addEventListener("touchstart", unlockAudio, { once: true });

// Create keys UI
letters.forEach(letter => {
  const div = document.createElement("div");
  div.classList.add("key");
  div.innerText = letter;
  div.dataset.key = letter;
  keyContainer.appendChild(div);

  div.addEventListener("mousedown", (e) => {
    e.preventDefault();
    startSound(letter);
  });
  div.addEventListener("mouseup", () => stopSound(letter));
  div.addEventListener("mouseleave", () => stopSound(letter));

  // Touch support
  div.addEventListener("touchstart", (e) => {
    e.preventDefault();
    startSound(letter);
  });
  div.addEventListener("touchend", () => stopSound(letter));
  div.addEventListener("touchcancel", () => stopSound(letter));
});

// Load samples from folder
document.getElementById("folderInput").addEventListener("change", async function(e) {
  const files = Array.from(e.target.files).filter(f =>
    f.type.includes("audio") || f.name.match(/\.(wav|mp3)$/i)
  );

  if (files.length === 0) {
    alert("No audio files found! Please select a folder with .wav or .mp3 files.");
    return;
  }

  let loadedCount = 0;
  for (let i = 0; i < letters.length && i < files.length; i++) {
    if (files[i]) {
      try {
        const arrayBuffer = await files[i].arrayBuffer();
        audioBuffers[letters[i]] = await audioContext.decodeAudioData(arrayBuffer);
        loadedCount++;
      } catch(err) {
        console.warn(`Failed to load ${files[i].name}:`, err);
      }
    }
  }

  if (loadedCount > 0) {
    alert(`Loaded ${loadedCount} sounds! Press Q W E R T Y U I O P keys to play. (Loop mode ON)`);
  } else {
    alert("Could not decode audio files. Please ensure valid .wav or .mp3 files.");
  }
});

function startSound(letter) {
  if (!audioBuffers[letter]) return;

  // Resume context if needed
  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }

  // Stop existing instance if playing (retrigger behavior)
  if (activeSources[letter]) {
    try {
      activeSources[letter].stop();
    } catch(e) {}
    delete activeSources[letter];
  }

  const source = audioContext.createBufferSource();
  source.buffer = audioBuffers[letter];
  source.loop = loopEnabled;  // Always true
  source.playbackRate.value = parseFloat(speedSlider.value);

  source.connect(masterGain);
  source.start();

  activeSources[letter] = source;

  // Visual feedback
  const keyElement = document.querySelector(`.key[data-key="${letter}"]`);
  if (keyElement) keyElement.classList.add("active");
}

function stopSound(letter) {
  if (activeSources[letter]) {
    try {
      activeSources[letter].stop();
    } catch(e) {}
    delete activeSources[letter];
  }

  const keyElement = document.querySelector(`.key[data-key="${letter}"]`);
  if (keyElement) keyElement.classList.remove("active");
}

// Keyboard controls
document.addEventListener("keydown", (e) => {
  const letter = e.key.toUpperCase();
  if (letters.includes(letter)) {
    e.preventDefault();
    if (!activeSources[letter]) {
      startSound(letter);
    }
  }
});

document.addEventListener("keyup", (e) => {
  const letter = e.key.toUpperCase();
  if (letters.includes(letter)) {
    e.preventDefault();
    stopSound(letter);
  }
});

// Sliders
const volumeSlider = document.getElementById("volume");
const speedSlider = document.getElementById("speed");

volumeSlider.addEventListener("input", (e) => {
  masterGain.gain.value = parseFloat(e.target.value);
});

speedSlider.addEventListener("input", (e) => {
  const newRate = parseFloat(e.target.value);
  // Update all currently playing sounds
  Object.values(activeSources).forEach(source => {
    if (source && source.playbackRate) {
      source.playbackRate.value = newRate;
    }
  });
});

// Loop is always ON - no toggle button visible
const loopBtn = document.getElementById("loopBtn");
if (loopBtn) {
  loopBtn.style.pointerEvents = "none";
}

// Cleanup any stray ended sources
setInterval(() => {
  for (let [letter, source] of Object.entries(activeSources)) {
    if (!source || source.playbackState === 'ended') {
      delete activeSources[letter];
      const el = document.querySelector(`.key[data-key="${letter}"]`);
      if (el) el.classList.remove("active");
    }
  }
}, 500);
</script>

</body>
</html>
