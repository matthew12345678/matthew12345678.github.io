<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Shaping Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

<script src="https://cdn.cycling74.com/rnbo/1.3.3/rnbo.min.js"></script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #74bddb;
    color: #000;
  }

  .page {
    width: 1140px;
    margin: 36px auto 80px;
  }

  .title-wrap {
    text-align: center;
    margin-bottom: 54px;
  }

  .title-box {
    display: inline-block;
    background: #ffed00;
    border: 4px solid #000;
    padding: 12px 26px 10px;
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.5px;
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
  }

  #fileInput {
    display: none;
  }

  .choose-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 245px;
    height: 68px;
    background: #ffb600;
    border: 4px solid #000;
    font-size: 26px;
    font-weight: 900;
    cursor: pointer;
    user-select: none;
  }

  .file-help {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
  }

  .wave-shell {
    margin-top: 8px;
  }

  .wave-box {
    position: relative;
    width: 1100px;
    height: 212px;
    border: 4px solid #000;
    background: #ececec;
    overflow: hidden;
  }

  .wave-selected {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(245, 239, 187, 0.8);
    pointer-events: none;
    z-index: 1;
  }

  #waveform {
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
    background: transparent;
    z-index: 2;
  }

  .range-wrap {
    position: relative;
    width: 1100px;
    margin-top: 22px;
  }

  #rangeSlider {
    margin: 0;
  }

  .instruction {
    margin-top: 28px;
    font-size: 28px;
    font-weight: 800;
  }

  .small-controls {
    display: flex;
    gap: 140px;
    margin-top: 56px;
    margin-bottom: 22px;
  }

  .small-control {
    width: 320px;
  }

  .small-slider {
    margin-bottom: 18px;
    padding-top: 10px;
  }

  .small-label {
    font-size: 28px;
    font-weight: 900;
    margin-top: 22px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 140px;
    margin-bottom: 60px;
  }

  .big-toggle {
    display: flex;
    align-items: center;
    gap: 26px;
    width: 320px;
  }

  .box-toggle {
    appearance: none;
    -webkit-appearance: none;
    width: 84px;
    height: 84px;
    background: #ffed00;
    border: 4px solid #000;
    cursor: pointer;
    position: relative;
    margin: 0;
    flex: 0 0 auto;
  }

  .box-toggle:checked::before,
  .box-toggle:checked::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 56px;
    height: 6px;
    background: #000;
    transform-origin: center;
  }

  .box-toggle:checked::before {
    transform: translate(-50%, -50%) rotate(45deg);
  }

  .box-toggle:checked::after {
    transform: translate(-50%, -50%) rotate(-45deg);
  }

  .toggle-label {
    font-size: 28px;
    font-weight: 900;
  }

  .midi-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 150px;
    height: 84px;
    background: #ffb600;
    border: 4px solid #000;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    padding: 0 12px;
    text-align: center;
    line-height: 1.1;
    flex: 0 0 auto;
  }

  .midi-button:active {
    transform: translateY(2px);
  }

  /* noUiSlider restyle to match drawing */
  .noUi-target {
    background: #efefef;
    border: 4px solid #000;
    border-radius: 0;
    box-shadow: none;
    height: 30px;
  }

  .noUi-base {
    height: 100%;
  }

  .noUi-connects {
    border-radius: 0;
    overflow: hidden;
  }

  .noUi-connect {
    background: #ffed00;
  }

  .noUi-origin {
    z-index: 4;
  }

  .noUi-horizontal .noUi-handle {
    width: 20px;
    height: 66px;
    right: -10px;
    top: -22px;
    border: 4px solid #000;
    border-radius: 0;
    background: #ffb600;
    box-shadow: none;
    cursor: ew-resize;
  }

  .noUi-handle::before,
  .noUi-handle::after {
    display: none;
  }

  /* black line sliders */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 280px;
    background: transparent;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 14px;
    background: #000;
    border-radius: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 70px;
    margin-top: -28px;
    background: #ffed00;
    border: 4px solid #000;
    border-radius: 0;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-track {
    height: 14px;
    background: #000;
    border: none;
    border-radius: 0;
  }

  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 70px;
    background: #ffed00;
    border: 4px solid #000;
    border-radius: 0;
    cursor: pointer;
  }

  /* MIDI modal */
  .midi-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .midi-modal {
    background: #74bddb;
    border: 4px solid #000;
    padding: 24px;
    min-width: 340px;
  }

  .midi-modal h3 {
    margin: 0 0 14px 0;
    font-size: 28px;
  }

  .midi-modal button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px 14px;
    border: 3px solid #000;
    background: #ffed00;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }

  @media (max-width: 1200px) {
    .page {
      width: calc(100% - 40px);
    }

    .wave-box,
    .range-wrap {
      width: 100%;
    }

    .small-controls,
    .toggle-row {
      gap: 40px;
      flex-wrap: wrap;
    }
  }
</style>
</head>

<body>
  <div class="page">

    <div class="title-wrap">
      <div class="title-box">SOUND SHAPING LAB</div>
    </div>

    <div class="file-row">
      <label for="fileInput" class="choose-btn">CHOOSE FILE</label>
      <input type="file" id="fileInput" accept="audio/*">
      <div class="file-help">Select a sound (.wav or .mp3)</div>
    </div>

    <div class="wave-shell">
      <div class="wave-box">
        <div id="selectedRegion" class="wave-selected"></div>
        <canvas id="waveform" width="1100" height="212"></canvas>
      </div>

      <div class="range-wrap">
        <div id="rangeSlider"></div>
      </div>
    </div>

    <div class="instruction">Change the start and end point of the sample by moving the orange sliders</div>

    <div class="small-controls">
      <div class="small-control">
        <div class="small-slider">
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
        </div>
        <div class="small-label">VOLUME</div>
      </div>

      <div class="small-control">
        <div class="small-slider">
          <input type="range" id="rateSlider" min="0.001" max="3" step="0.001" value="1">
        </div>
        <div class="small-label">SPEED</div>
      </div>
    </div>

    <div class="toggle-row">
      <label class="big-toggle">
        <input type="checkbox" id="toggleStart" class="box-toggle">
        <span class="toggle-label">START SOUND</span>
      </label>

      <label class="big-toggle">
        <input type="checkbox" id="toggleBackwards" class="box-toggle">
        <span class="toggle-label">BACKWARDS</span>
      </label>

      <button id="openMidiLearnModal" class="midi-button">MIDI CONTROLS</button>
    </div>
  </div>

  <div id="midiLearnModal" class="midi-modal-overlay">
    <div class="midi-modal">
      <h3>MIDI Learn</h3>
      <button id="closeMidiLearnModal">Close</button>
      <button id="midiLearnVolume">MIDI Learn Volume</button>
      <button id="midiLearnRate">MIDI Learn Rate</button>
      <button id="midiLearnPlay">MIDI Learn Play</button>
      <button id="midiLearnBackwards">MIDI Learn Backwards</button>
      <button id="midiLearnPosL">MIDI Learn Left Position</button>
      <button id="midiLearnPosR">MIDI Learn Right Position</button>
      <button id="midiLearnDragRange">MIDI Learn Move Head</button>
    </div>
  </div>

<script>
let device;
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
let lastLoadedBuffer = null;

function applyLoadedBufferToDevice() {
  if (!lastLoadedBuffer) return;
  if (!device || typeof device.setDataBuffer !== "function") return;
  device.setDataBuffer("kick", lastLoadedBuffer, lastLoadedBuffer.numberOfChannels, lastLoadedBuffer.sampleRate);
}

function pulsePlayIfEnabled() {
  const startEl = document.getElementById("toggleStart");
  if (!startEl || !startEl.checked) return;
  setRNBOParam("play", 0);
  setTimeout(() => setRNBOParam("play", 1), 0);
}

async function setupRNBO() {
  try {
    const patcherUrl = new URL("./export/patch.export.json", window.location.href);
    const res = await fetch(patcherUrl.toString(), { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} loading RNBO patch`);
    const patcher = await res.json();
    device = await RNBO.createDevice({ patcher, context: audioContext });
    device.node.connect(audioContext.destination);
  } catch (err) {
    console.error("RNBO setup failed", err);
    const isFile = window.location.protocol === "file:";
    alert(
      isFile
        ? "RNBO patch couldn't be loaded because this page is opened as a local file.\n\nRun a local server in this folder:\npython3 -m http.server 5173\nThen open http://localhost:5173"
        : "RNBO patch couldn't be loaded. Check the console for details."
    );
    return;
  }

  const volEl = document.getElementById("volumeSlider");
  const rateEl = document.getElementById("rateSlider");
  const startEl = document.getElementById("toggleStart");
  const backwardsEl = document.getElementById("toggleBackwards");

  if (volEl) setRNBOParam("volume", parseFloat(volEl.value));
  if (rateEl) setRNBOParam("rate", parseFloat(rateEl.value));
  if (startEl) setRNBOParam("play", startEl.checked ? 1 : 0);
  setRNBOParam("loop", 1);
  if (backwardsEl) setRNBOParam("backwards", backwardsEl.checked ? 1 : 0);

  applyLoadedBufferToDevice();
  pulsePlayIfEnabled();
}
setupRNBO();

function setRNBOParam(id, value) {
  const param = device?.parametersById.get(id);
  if (param) param.value = value;
}

function drawWaveform(buffer) {
  const canvas = document.getElementById("waveform");
  const ctx = canvas.getContext("2d");
  const width = canvas.width;
  const height = canvas.height;
  const data = buffer.getChannelData(0);
  const step = Math.max(1, Math.floor(data.length / width));
  const centerY = height / 2;

  ctx.clearRect(0, 0, width, height);

  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "#1e88c8";
  ctx.beginPath();

  for (let i = 0; i < width; i++) {
    let min = 1;
    let max = -1;

    for (let j = 0; j < step; j++) {
      const datum = data[(i * step) + j];
      if (datum === undefined) continue;
      if (datum < min) min = datum;
      if (datum > max) max = datum;
    }

    const y1 = centerY + min * centerY * 0.84;
    const y2 = centerY + max * centerY * 0.84;
    ctx.moveTo(i, y1);
    ctx.lineTo(i, y2);
  }

  ctx.stroke();
}

function updateSelectedRegion(values) {
  const [start, end] = values.map(parseFloat);
  const region = document.getElementById("selectedRegion");
  region.style.left = `${start * 100}%`;
  region.style.width = `${(end - start) * 100}%`;
}

const rangeSlider = document.getElementById("rangeSlider");
noUiSlider.create(rangeSlider, {
  start: [0.12, 0.77],
  connect: true,
  behaviour: "drag",
  range: { min: 0, max: 1 },
  step: 0.001,
  margin: 0.01
});

rangeSlider.noUiSlider.on("update", (values) => {
  const [posl, posr] = values.map(parseFloat);
  setRNBOParam("posl", posl);
  setRNBOParam("posr", posr);
  updateSelectedRegion(values);
});

updateSelectedRegion([0.12, 0.77]);

document.getElementById("fileInput").addEventListener("change", async (evt) => {
  const file = evt.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async () => {
    try {
      await audioContext.resume();
      const buffer = await audioContext.decodeAudioData(reader.result);

      drawWaveform(buffer);
      lastLoadedBuffer = buffer;

      applyLoadedBufferToDevice();

      // avoid exact 0, because the patch appears to stop there
      const startPos = 0.001;
      const endPos = 1;

      rangeSlider.noUiSlider.set([startPos, endPos]);
      setRNBOParam("posl", startPos);
      setRNBOParam("posr", endPos);

      if (toggleStart.checked) {
        setRNBOParam("play", 0);

        setTimeout(() => {
          setRNBOParam("posl", startPos);
          setRNBOParam("posr", endPos);
          setRNBOParam("play", 1);
        }, 20);
      }
    } catch (err) {
      console.error("Error loading audio file", err);
      alert("There was a problem loading this audio file.");
    }
  };
  reader.readAsArrayBuffer(file);
});

volumeSlider.oninput = (e) => setRNBOParam("volume", parseFloat(e.target.value));
rateSlider.oninput = (e) => setRNBOParam("rate", parseFloat(e.target.value));
toggleStart.onchange = (e) => setRNBOParam("play", e.target.checked ? 1 : 0);
toggleBackwards.onchange = (e) => setRNBOParam("backwards", e.target.checked ? 1 : 0);

const modal = document.getElementById("midiLearnModal");
openMidiLearnModal.onclick = () => modal.style.display = "flex";
closeMidiLearnModal.onclick = () => modal.style.display = "none";
modal.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};

let midiAccess = null;
let midiMapping = {};

try {
  midiMapping = JSON.parse(localStorage.getItem("midiMapping") || "{}");
} catch (e) {
  midiMapping = {};
}

if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then((access) => {
    midiAccess = access;
    for (let input of midiAccess.inputs.values()) {
      input.onmidimessage = handleMIDIMessage;
    }
  }).catch((err) => {
    console.warn("Web MIDI access failed:", err);
  });
} else {
  console.warn("Web MIDI API not supported in this browser.");
}

function handleMIDIMessage(message) {
  const [status, data1, data2] = message.data;

  if (status >= 176 && status <= 191) {
    for (let id in midiMapping) {
      if (midiMapping[id] === data1) {
        if (id === "posl") {
          const values = rangeSlider.noUiSlider.get();
          let r = parseFloat(values[1]);
          let newL = data2 / 127;
          if (r - newL < 0.01) newL = r - 0.01;
          rangeSlider.noUiSlider.set([newL, r]);
        } else if (id === "posr") {
          const values = rangeSlider.noUiSlider.get();
          let l = parseFloat(values[0]);
          let newR = data2 / 127;
          if (newR - l < 0.01) newR = l + 0.01;
          rangeSlider.noUiSlider.set([l, newR]);
        } else if (id === "dragZone") {
          const windowRange = rangeSlider.noUiSlider.get();
          const size = parseFloat(windowRange[1]) - parseFloat(windowRange[0]);
          const dragPos = data2 / 127;
          let newMin = Math.min(Math.max(dragPos - size / 2, 0), 1 - size);
          let newMax = newMin + size;
          rangeSlider.noUiSlider.set([newMin, newMax]);
        } else {
          const control = document.getElementById(id);
          if (control) {
            if (control.type === "checkbox") {
              control.checked = (data2 >= 64);
              control.dispatchEvent(new Event("change"));
            } else {
              const min = parseFloat(control.min || 0);
              const max = parseFloat(control.max || 1);
              control.value = min + ((data2 / 127) * (max - min));
              control.dispatchEvent(new Event("input"));
            }
          }
        }
      }
    }
  }
}

function learnMIDI(id) {
  alert(`Move a MIDI control now to assign to ${id}`);
  function tempHandler(message) {
    const [status, data1] = message.data;
    if (status >= 176 && status <= 191) {
      midiMapping[id] = data1;
      try {
        localStorage.setItem("midiMapping", JSON.stringify(midiMapping));
      } catch (e) {
        console.warn("Failed to store MIDI mapping:", e);
      }
      for (let input of midiAccess.inputs.values()) {
        input.onmidimessage = handleMIDIMessage;
      }
    }
  }

  if (!midiAccess) return;
  for (let input of midiAccess.inputs.values()) {
    input.onmidimessage = tempHandler;
  }
}

document.getElementById("midiLearnVolume").addEventListener("click", () => learnMIDI("volumeSlider"));
document.getElementById("midiLearnRate").addEventListener("click", () => learnMIDI("rateSlider"));
document.getElementById("midiLearnPlay").addEventListener("click", () => learnMIDI("toggleStart"));
document.getElementById("midiLearnBackwards").addEventListener("click", () => learnMIDI("toggleBackwards"));
document.getElementById("midiLearnPosL").addEventListener("click", () => learnMIDI("posl"));
document.getElementById("midiLearnPosR").addEventListener("click", () => learnMIDI("posr"));
document.getElementById("midiLearnDragRange").addEventListener("click", () => learnMIDI("dragZone"));
</script>
</body>
</html>
