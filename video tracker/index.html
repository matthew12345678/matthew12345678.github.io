<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Clean CV Audio Instrument (Fixed)</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #0f0;
    font-family: monospace;
}

#topbar {
    padding: 10px;
    background: #111;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

canvas {
    margin: 10px;
    border: 1px solid #222;
    cursor: crosshair;
}

#info {
    margin: 10px;
    white-space: pre;
}
</style>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>

<body>

<div id="topbar">

<input type="file" id="file">

<button id="play">Play</button>
<button id="pause">Pause</button>

<label>
<input type="checkbox" id="audio"> Audio
</label>

<label>
<input type="checkbox" id="showBox" checked> Tracking box
</label>

<select id="mode">
<option value="tone">tone</option>
<option value="theremin">theremin</option>
<option value="synth">synth</option>
</select>

</div>

<video id="vid" style="display:none;"></video>
<canvas id="c"></canvas>

<div id="info">waiting...</div>

<script>

let vid = document.getElementById("vid");
let c = document.getElementById("c");
let ctx = c.getContext("2d");

const TEMPLATE_SIZE = 40;
const HALF = TEMPLATE_SIZE / 2;
const SEARCH_PAD = 80;

let objects = [];
let cvReady = false;
let frameReady = false;

let grayFrame = null;
let matchResult = null;

/* ---------------- OPEN CV READY ---------------- */

cv['onRuntimeInitialized'] = () => {
    cvReady = true;
};

/* ---------------- AUDIO ---------------- */

let audioCtx, master;

function initAudio(){
    if(audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    master = audioCtx.createGain();
    master.gain.value = 0.6;
    master.connect(audioCtx.destination);
}

/* ---------------- OBJECT ---------------- */

function makeObj(x, y){

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    let pan = audioCtx.createStereoPanner();
    let filter = audioCtx.createBiquadFilter();

    osc.type = "sine";
    osc.frequency.value = 220;

    gain.gain.value = 0;

    filter.type = "lowpass";
    filter.frequency.value = 800;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(pan);
    pan.connect(master);

    osc.start();

    return {
        x, y,
        template: null,
        osc, gain, pan, filter
    };
}

function captureTemplate(x, y){
    let src = cv.imread(c);
    let gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    let rect = new cv.Rect(
        Math.max(0, Math.round(x - HALF)),
        Math.max(0, Math.round(y - HALF)),
        TEMPLATE_SIZE,
        TEMPLATE_SIZE
    );
    let template = gray.roi(rect).clone();

    src.delete();
    gray.delete();

    return template;
}

function ensureBuffers(w, h){
    if(grayFrame && grayFrame.cols === w && grayFrame.rows === h) return;

    if(grayFrame) grayFrame.delete();
    if(matchResult) matchResult.delete();

    grayFrame = new cv.Mat(h, w, cv.CV_8UC1);
    matchResult = new cv.Mat();
}

function trackObject(gray, o){
    let tw = o.template.cols;
    let th = o.template.rows;

    let sx = Math.max(0, Math.round(o.x - HALF - SEARCH_PAD));
    let sy = Math.max(0, Math.round(o.y - HALF - SEARCH_PAD));
    let sw = Math.min(gray.cols - sx, tw + SEARCH_PAD * 2);
    let sh = Math.min(gray.rows - sy, th + SEARCH_PAD * 2);

    if(sw < tw || sh < th){
        sx = 0;
        sy = 0;
        sw = gray.cols;
        sh = gray.rows;
    }

    let roi = gray.roi(new cv.Rect(sx, sy, sw, sh));

    cv.matchTemplate(roi, o.template, matchResult, cv.TM_CCOEFF_NORMED);
    roi.delete();

    let mm = cv.minMaxLoc(matchResult);

    o.x = sx + mm.maxLoc.x + tw / 2;
    o.y = sy + mm.maxLoc.y + th / 2;
}

function drawTrackingBox(o){
    let w = o.template.cols;
    let h = o.template.rows;

    ctx.strokeStyle = "#0f0";
    ctx.lineWidth = 2;
    ctx.strokeRect(o.x - w / 2, o.y - h / 2, w, h);

    ctx.strokeStyle = "rgba(0,255,0,0.5)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(o.x - 6, o.y);
    ctx.lineTo(o.x + 6, o.y);
    ctx.moveTo(o.x, o.y - 6);
    ctx.lineTo(o.x, o.y + 6);
    ctx.stroke();
}

function disposeObject(o){
    if(o.template) o.template.delete();
    o.osc.stop();
    o.osc.disconnect();
    o.gain.disconnect();
    o.pan.disconnect();
    o.filter.disconnect();
}

function clearObjects(){
    objects.forEach(disposeObject);
    objects = [];
}

function drawVideoFrame(){
    if(vid.readyState >= 2){
        ctx.drawImage(vid, 0, 0);
    }
}

function redrawCanvas(){
    drawVideoFrame();
    if(document.getElementById("showBox").checked){
        objects.forEach(drawTrackingBox);
    }
}

function updateSetupInfo(){
    let n = objects.length;
    let msg = "Frame frozen — click to add tracker" + (n === 1 ? "" : "s");
    if(n) msg += ` (${n} selected)`;
    msg += ", then press Play";
    document.getElementById("info").textContent = msg;
}

function freezeFirstFrame(){
    frameReady = false;
    vid.pause();

    let onSeeked = () => {
        if(frameReady) return;
        vid.removeEventListener("seeked", onSeeked);
        drawVideoFrame();
        frameReady = true;
        updateSetupInfo();
    };

    vid.addEventListener("seeked", onSeeked);
    vid.currentTime = 0;

    requestAnimationFrame(() => {
        if(!frameReady && vid.readyState >= 2) onSeeked();
    });
}

/* ---------------- LOAD VIDEO ---------------- */

document.getElementById("file").onchange = (e) => {
    let f = e.target.files[0];
    if(!f) return;

    clearObjects();
    frameReady = false;
    vid.src = URL.createObjectURL(f);

    vid.onloadeddata = () => {
        c.width = vid.videoWidth;
        c.height = vid.videoHeight;
        ensureBuffers(c.width, c.height);
        freezeFirstFrame();
    };
};

document.getElementById("showBox").onchange = () => {
    if(vid.paused && frameReady) redrawCanvas();
};

/* ---------------- PLAY ---------------- */

document.getElementById("play").onclick = async () => {
    if(!frameReady) return;
    initAudio();
    audioCtx.resume();
    await vid.play();
    loop();
};

document.getElementById("pause").onclick = () => {
    vid.pause();
};

/* ---------------- CLICK ---------------- */

c.onclick = (e) => {

    if(!cvReady) {
        alert("OpenCV still loading...");
        return;
    }

    if(!frameReady) return;

    let r = c.getBoundingClientRect();

    let x = (e.clientX - r.left) * c.width / r.width;
    let y = (e.clientY - r.top) * c.height / r.height;

    initAudio();

    let o = makeObj(x, y);
    o.template = captureTemplate(x, y);

    objects.push(o);

    if(vid.paused){
        redrawCanvas();
        updateSetupInfo();
    }
};

/* ---------------- LOOP ---------------- */

function loop(){

    if(vid.paused) return;

    ctx.drawImage(vid, 0, 0);

    let mode = document.getElementById("mode").value;
    let audioOn = document.getElementById("audio").checked;
    let showBox = document.getElementById("showBox").checked;

    let info = "";

    if(objects.length && cvReady){
        ensureBuffers(c.width, c.height);

        let src = cv.imread(c);
        cv.cvtColor(src, grayFrame, cv.COLOR_RGBA2GRAY);
        src.delete();

        objects.forEach(o => {
            trackObject(grayFrame, o);

            let nx = o.x / c.width;
            let ny = o.y / c.height;
            let freq = 120 + nx * 1200;
            let v = Math.max(0, 1 - ny);

            if(audioOn){
                if(mode === "tone"){
                    o.osc.frequency.value = freq;
                    o.gain.gain.value = v * 0.3;
                }

                if(mode === "theremin"){
                    o.osc.frequency.value = freq;
                    o.pan.pan.value = nx * 2 - 1;
                    o.gain.gain.value = v * 0.3;
                }

                if(mode === "synth"){
                    o.osc.frequency.value = freq;
                    o.filter.frequency.value = 300 + v * 2000;
                    o.pan.pan.value = nx * 2 - 1;
                    o.gain.gain.value = v * 0.4;
                }
            } else {
                o.gain.gain.value = 0;
            }

            if(showBox){
                drawTrackingBox(o);
            }

            info += `X:${o.x.toFixed(1)} Y:${o.y.toFixed(1)} F:${freq.toFixed(0)}\n`;
        });
    }

    document.getElementById("info").textContent = info || "click video to add tracker";

    requestAnimationFrame(loop);
}

</script>

</body>
</html>
